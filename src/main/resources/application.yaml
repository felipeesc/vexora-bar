spring:
  application:
    name: vexora

  datasource:
    url: jdbc:postgresql://localhost:5433/vexora
    username: postgres
    password: postgres

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

jwt:
  secret: ${JWT_SECRET:oJ8w3uPqRhnbxP5UkHoFXJvawwD8/v8WNMuMdzYi+Bc=}
  expiration: ${JWT_EXPIRATION:86400000}
